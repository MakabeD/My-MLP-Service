name: Build and Push Credit API to GAR

on:
  pull_request:
    branches: [main, dev]
    paths:
      - "python/credit-scoring/**"

env:
  PROJECT_ID: "silver-impulse-423523-j5"
  GAR_LOCATION: "us-east1"
  GAR_REPO: "mlp-models"
  IMAGE_NAME: "api-credit-scoring"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for GAR
        run: |-
          gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev

      - name: Install dvc
        run: pip install dvc 
      
      - name: Configure dagshub credentials
        run: |
          dvc remote modify origin --local auth basic
          dvc remote modify origin --local user MakabeD
          dvc remote modify origin --local password ${{ secrets.DAGSHUB_TOKEN }}

      - name: Pull DVC data
        run: dvc pull -r origin
        
      - name: Build and Push Image
        run: |-
          IMAGE_URL="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          
          docker build -t $IMAGE_URL ./python/credit-scoring
          docker push $IMAGE_URL