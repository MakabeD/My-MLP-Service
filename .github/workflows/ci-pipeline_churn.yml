name: pipeline CI/CD MLOps_churn

on:
  pull_request:
    branches: [main, dev]
    paths:
      - "python/mobile-churn/**"

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./python/mobile-churn

    steps:
      - name: check repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10.11"

      - name: Install requirements
        run: pip install -r requirements.txt
      - name: Install DVC
        run: pip install dvc
      - name: Pull DVC data
        run: dvc pull
      - name: Run test
        run: pytest src/test/
