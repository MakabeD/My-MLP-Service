name: Build and Push Churn API to GAR

on:
  pull_request:
    branches: [main, dev]
    paths:
      - "python/mobile-churn/**"

env:
  PROJECT_ID: "silver-impulse-423523-j5"
  GAR_LOCATION: "us-east1"
  GAR_REPO: "mlp-models"
  IMAGE_NAME: "api-mobile-churn"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for GAR
        run: |-
          gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev

      - name: Build and Push Image
        run: |-
          IMAGE_URL="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          
          docker build -t $IMAGE_URL ./python/mobile-churn
          docker push $IMAGE_URL